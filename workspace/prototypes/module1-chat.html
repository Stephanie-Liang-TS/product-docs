<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODE-YI Module 1: 对话 — Interactive Prototype</title>
<style>
:root {
  --bg: #0f0f1a;
  --bg-nav: #0a0a14;
  --surface: #1a1a2e;
  --surface2: #16162a;
  --surface3: #22223a;
  --border: #2a2a45;
  --border-light: #3a3a55;
  --text: #e0e0f0;
  --text2: #8888aa;
  --text3: #666688;
  --accent: #7c5cfc;
  --accent-dim: #5a3ed4;
  --accent-glow: rgba(124, 92, 252, 0.15);
  --accent-bg: rgba(124, 92, 252, 0.08);
  --green: #3ecf8e;
  --orange: #f0a030;
  --red: #f05050;
  --cyan: #22d3ee;
  --purple: #a78bfa;
  --yellow: #fbbf24;
  --sidebar-width: 220px;
  --channel-width: 260px;
  --member-width: 240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
}

/* ============ MODULE SIDEBAR (leftmost) ============ */
.module-sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: linear-gradient(180deg, #12102a 0%, #0d0b1e 100%);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.sidebar-logo {
  padding: 20px 16px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.logo-badge {
  background: var(--accent);
  color: white;
  font-weight: 800;
  font-size: 13px;
  padding: 4px 8px;
  border-radius: 6px;
  letter-spacing: 1px;
}

.logo-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.logo-version {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}

.sidebar-section {
  padding: 16px 0 4px;
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 0 16px 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text2);
  font-size: 13.5px;
  position: relative;
}

.sidebar-item:hover {
  background: rgba(124, 92, 252, 0.06);
  color: var(--text);
}

.sidebar-item.active {
  background: rgba(124, 92, 252, 0.15);
  color: white;
  border-left: 3px solid var(--accent);
  padding-left: 13px;
}

.sidebar-item .icon {
  width: 18px;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
}

.sidebar-item.active .icon { opacity: 1; }

.sidebar-badge {
  margin-left: auto;
  background: var(--accent);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 18px;
  text-align: center;
}

.sidebar-badge.muted {
  background: var(--surface3);
  color: var(--text2);
}

.sidebar-spacer { flex: 1; }

.sidebar-user {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #9b7dff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: white;
}

.sidebar-username {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

.sidebar-user-role {
  font-size: 11px;
  color: var(--text3);
}

/* ============ CHANNEL LIST PANEL ============ */
.channel-panel {
  width: var(--channel-width);
  min-width: var(--channel-width);
  background: var(--surface2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.channel-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.channel-header h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.channel-add-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.15s;
}

.channel-add-btn:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.channel-search {
  padding: 8px 16px 12px;
}

.channel-search input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.channel-search input::placeholder { color: var(--text3); }
.channel-search input:focus { border-color: var(--accent); }

.channel-list {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 12px;
}

.channel-list::-webkit-scrollbar { width: 4px; }
.channel-list::-webkit-scrollbar-track { background: transparent; }
.channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.channel-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 12px 16px 6px;
}

.channel-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  cursor: pointer;
  transition: all 0.12s;
  border-left: 3px solid transparent;
}

.channel-item:hover {
  background: rgba(124, 92, 252, 0.06);
}

.channel-item.active {
  background: rgba(124, 92, 252, 0.12);
  border-left-color: var(--accent);
}

.channel-item .ch-hash {
  color: var(--text3);
  font-size: 15px;
  font-weight: 700;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}

.channel-item .ch-name {
  font-size: 13.5px;
  color: var(--text2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.channel-item.active .ch-name,
.channel-item.unread .ch-name {
  color: var(--text);
  font-weight: 600;
}

.channel-item .ch-badge {
  background: var(--red);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 18px;
  text-align: center;
}

.channel-item .ch-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ch-dot.green { background: var(--green); }
.ch-dot.gray { background: var(--text3); }

.channel-item .ch-icon {
  font-size: 15px;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}

.dm-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  position: relative;
}

.dm-avatar .dm-status {
  position: absolute;
  bottom: -1px;
  right: -1px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid var(--surface2);
}

.ai-badge-sm {
  font-size: 8px;
  font-weight: 800;
  background: var(--accent);
  color: white;
  padding: 1px 3px;
  border-radius: 3px;
  margin-left: 4px;
  flex-shrink: 0;
}

.qa-badge-sm {
  font-size: 8px;
  font-weight: 800;
  background: var(--orange);
  color: white;
  padding: 1px 3px;
  border-radius: 3px;
  margin-left: 4px;
  flex-shrink: 0;
}

/* ============ MAIN CHAT AREA ============ */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg);
}

.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(15, 15, 26, 0.95);
  backdrop-filter: blur(8px);
  min-height: 52px;
}

.chat-header-hash {
  color: var(--text3);
  font-size: 20px;
  font-weight: 700;
}

.chat-header-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.chat-header-meta {
  font-size: 12px;
  color: var(--text3);
  margin-left: 4px;
}

.chat-header-spacer { flex: 1; }

.chat-header-actions {
  display: flex;
  gap: 8px;
}

.header-action-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}

.header-action-btn:hover {
  background: var(--surface);
  color: var(--text);
}

.header-action-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* Message visibility toggle */
.visibility-toggle {
  position: relative;
}

.visibility-tooltip {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.visibility-toggle:hover .visibility-tooltip {
  display: block;
}

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.message {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  margin-top: 2px;
}

.message-body {
  flex: 1;
  min-width: 0;
}

.message-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}

.message-author {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--text);
}

.message-role-tag {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
}

.tag-admin {
  background: rgba(124, 92, 252, 0.2);
  color: var(--accent);
}

.tag-ai {
  background: rgba(124, 92, 252, 0.25);
  color: #b8a4ff;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

.tag-qa {
  background: rgba(240, 160, 48, 0.2);
  color: var(--orange);
}

.tag-member {
  background: rgba(62, 207, 142, 0.15);
  color: var(--green);
}

.tag-model {
  font-size: 9px;
  color: var(--text3);
  font-weight: 400;
}

.message-time {
  font-size: 11px;
  color: var(--text3);
}

.message-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
  word-break: break-word;
}

.message-text .mention {
  color: var(--accent);
  font-weight: 600;
  cursor: pointer;
}

.message-text .mention:hover { text-decoration: underline; }

.message-text .link {
  color: var(--cyan);
  cursor: pointer;
  text-decoration: none;
}

.message-text .link:hover { text-decoration: underline; }

/* Code block inside messages */
.msg-code-block {
  background: #0d0d18;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 8px 0 4px;
  overflow: hidden;
}

.msg-code-header {
  background: var(--surface);
  padding: 6px 12px;
  font-size: 11px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.msg-code-body {
  padding: 12px 16px;
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  font-size: 12.5px;
  line-height: 1.6;
  color: #c9d1d9;
  overflow-x: auto;
  white-space: pre;
}

.msg-code-body .kw { color: #ff7b72; }
.msg-code-body .fn { color: #d2a8ff; }
.msg-code-body .str { color: #a5d6ff; }
.msg-code-body .cm { color: #8b949e; }
.msg-code-body .type { color: #79c0ff; }
.msg-code-body .num { color: #79c0ff; }

/* Bot-to-Bot banner */
.bot-bot-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  margin: 6px 0;
  background: rgba(124, 92, 252, 0.06);
  border: 1px dashed rgba(124, 92, 252, 0.25);
  border-radius: 8px;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}

.bot-bot-banner .bb-icon {
  font-size: 14px;
}

.bot-bot-line {
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--accent), transparent);
  margin-left: 17px;
  height: 20px;
  border-radius: 1px;
}

/* Bot message subtle styling */
.message.bot-message {
  border-left: 2px solid rgba(124, 92, 252, 0.2);
  padding-left: 10px;
  margin-left: -12px;
}

.message.bot-bot {
  background: rgba(124, 92, 252, 0.03);
  border-radius: 8px;
  padding: 8px 10px;
  border-left: 2px solid var(--accent);
  margin-left: -12px;
}

/* Internal bot message (hidden by default) */
.message.bot-internal {
  display: none;
  opacity: 0.6;
  border-left: 2px dashed var(--text3);
  padding-left: 10px;
  margin-left: -12px;
}

.message.bot-internal.visible {
  display: flex;
}

.internal-tag {
  font-size: 9px;
  background: rgba(102, 102, 136, 0.2);
  color: var(--text3);
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
}

/* Typing indicator */
.typing-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  font-size: 12px;
  color: var(--text3);
}

.typing-indicator.visible { display: flex; }

.typing-dots {
  display: flex;
  gap: 3px;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text3);
  animation: typingBounce 1.4s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* Autonomous banner */
.autonomous-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  margin: 12px 0;
  background: linear-gradient(135deg, rgba(124, 92, 252, 0.1), rgba(34, 211, 238, 0.08));
  border: 1px solid rgba(124, 92, 252, 0.2);
  border-radius: 10px;
  font-size: 12px;
  color: var(--purple);
  font-weight: 600;
}

.autonomous-banner .ab-icon { font-size: 16px; }

/* ============ INPUT BAR ============ */
.chat-input-bar {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.chat-input-wrapper {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 12px;
  transition: border-color 0.2s;
}

.chat-input-wrapper:focus-within {
  border-color: var(--accent);
}

.chat-input-actions {
  display: flex;
  gap: 4px;
  padding-bottom: 2px;
}

.input-action-btn {
  width: 30px;
  height: 30px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.12s;
}

.input-action-btn:hover {
  background: var(--surface3);
  color: var(--text2);
}

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 24px;
  max-height: 120px;
  line-height: 1.5;
}

.chat-input::placeholder { color: var(--text3); }

.send-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.send-btn:hover {
  background: var(--accent-dim);
  transform: scale(1.05);
}

/* ============ MEMBER PANEL ============ */
.member-panel {
  width: var(--member-width);
  min-width: var(--member-width);
  background: var(--surface2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
}

.member-panel::-webkit-scrollbar { width: 4px; }
.member-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.member-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 16px 6px;
}

.member-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}

.member-item:hover {
  background: rgba(255,255,255,0.03);
}

.member-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  position: relative;
}

.member-status {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid var(--surface2);
}

.member-info {
  flex: 1;
  min-width: 0;
}

.member-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 4px;
}

.member-role-text {
  font-size: 11px;
  color: var(--text3);
}

.member-tag {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
}

.member-tag.executor {
  background: rgba(124, 92, 252, 0.15);
  color: var(--accent);
}

.member-tag.reviewer {
  background: rgba(240, 160, 48, 0.15);
  color: var(--orange);
}

.member-tag.observer {
  background: rgba(102, 102, 136, 0.15);
  color: var(--text3);
  position: relative;
}

/* Observer tooltip */
.observer-tooltip {
  display: none;
  position: absolute;
  left: -200px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text2);
  width: 190px;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  line-height: 1.4;
}

.member-item:hover .observer-tooltip {
  display: block;
}

/* ============ SCROLLBAR GLOBAL ============ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ============ DATE SEPARATOR ============ */
.date-separator {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  margin: 4px 0;
}

.date-separator::before,
.date-separator::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.date-separator span {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  white-space: nowrap;
}

/* ============ REPORT EMBED ============ */
.report-embed {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 6px;
  font-size: 13px;
}

.report-embed .re-title {
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.report-embed .re-stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text2);
}

.report-embed .re-stats .pass { color: var(--green); font-weight: 700; }
.report-embed .re-stats .fail { color: var(--red); font-weight: 700; }
.report-embed .re-stats .flaky { color: var(--orange); font-weight: 700; }
</style>

  online: [
    { name: '代码助手', role: 'AI / Claude Sonnet', color: '#7c5cfc', avatar: '&#x1F916;', status: 'green', tag: '执行者', tagClass: 'executor', isAI: true },
    { name: 'Review Bot', role: 'AI / Claude Sonnet', color: '#a78bfa', avatar: '&#x1F50D;', status: 'green', tag: '审核者', tagClass: 'reviewer', isAI: true },

  ],
  offline: []
};

// ============ STATE ============
let currentChannel = 'product-dev';
let showBotInternal = false;

// ============ RENDER FUNCTIONS ============

function renderMessages(channelId) {
  const channel = CHANNELS[channelId];
  if (!channel) return;

  const container = document.getElementById('chatMessages');
  container.innerHTML = '';

  channel.messages.forEach(msg => {
    if (msg.type === 'date') {
      container.innerHTML += `<div class="date-separator"><span>${msg.text}</span></div>`;
      return;
    }

    if (msg.type === 'bot-bot-start') {
      container.innerHTML += `
        <div class="bot-bot-banner">
          <span class="bb-icon">&#x1F50C;</span>
          Bot&#x2194;Bot 通信开始
        </div>`;
      return;
    }

    if (msg.type === 'bot-bot-end') {
      container.innerHTML += `
        <div class="bot-bot-banner">
          <span class="bb-icon">&#x2705;</span>
          Bot&#x2194;Bot 通信结束
        </div>`;
      return;
    }

    if (msg.type === 'autonomous-banner') {
      container.innerHTML += `
        <div class="autonomous-banner">
          <span class="ab-icon">&#x26A1;</span>
          ${msg.text}
        </div>`;
      return;
    }

    // Regular message
    let classes = 'message';
    if (msg.isBot) classes += ' bot-message';
    if (msg.isBotBot) classes += ' bot-bot';
    if (msg.isInternal) classes += ' bot-internal' + (showBotInternal ? ' visible' : '');

    let roleTag = '';
    if (msg.role === 'admin') roleTag = `<span class="message-role-tag tag-admin">${msg.roleLabel}</span>`;
    else if (msg.role === 'ai') roleTag = `<span class="message-role-tag tag-ai">&#x1F916; ${msg.roleLabel}</span>`;
    else if (msg.role === 'qa') roleTag = `<span class="message-role-tag tag-qa">&#x1F9EA; ${msg.roleLabel}</span>`;
    else if (msg.role === 'member') roleTag = `<span class="message-role-tag tag-member">${msg.roleLabel}</span>`;

    let modelTag = msg.model ? `<span class="tag-model">${msg.model}</span>` : '';
    let internalTag = msg.isInternal ? `<span class="internal-tag">内部</span>` : '';

    let codeHtml = '';
    if (msg.code) {
      codeHtml = `
        <div class="msg-code-block">
          <div class="msg-code-header">
            <span>${msg.code.lang}</span>
            <span style="cursor:pointer;color:var(--text3);">&#x1F4CB; Copy</span>
          </div>
          <div class="msg-code-body">${msg.code.body}</div>
        </div>`;
    }

    let reportHtml = '';
    if (msg.report) {
      reportHtml = `
        <div class="report-embed">
          <div class="re-title">&#x1F4CA; ${msg.report.title}</div>
          <div class="re-stats">
            <span>通过: <span class="pass">${msg.report.passed}</span></span>
            <span>失败: <span class="fail">${msg.report.failed}</span></span>
            <span>Flaky: <span class="flaky">${msg.report.flaky}</span></span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">${msg.report.note}</div>
          <div style="margin-top:6px;"><span class="link" style="font-size:12px;">[查看完整报告]</span></div>
        </div>`;
    }

    container.innerHTML += `
      <div class="${classes}">
        <div class="message-avatar" style="background: linear-gradient(135deg, ${msg.color}, ${msg.color}dd);">
          ${msg.avatar}
        </div>
        <div class="message-body">
          <div class="message-header">
            <span class="message-author">${msg.author}</span>
            ${roleTag}
            ${modelTag}
            ${internalTag}
            <span class="message-time">${msg.time}</span>
          </div>
          <div class="message-text">${msg.html}</div>
          ${codeHtml}
          ${reportHtml}
        </div>
      </div>`;
  });

  // Add typing indicator
  container.innerHTML += `
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span id="typingText">代码助手 正在输入...</span>
    </div>`;

  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

function renderMembers(channelId) {
  const channel = CHANNELS[channelId];
  if (!channel) return;

  let members;
  if (channel.members === 'bots-only') members = MEMBERS_BOTS;
  else if (channel.members === 'dm') members = null;
  else members = MEMBERS_DEFAULT;

  const container = document.getElementById('memberContent');

  if (!members) {
    container.innerHTML = `<div style="padding:20px 16px;color:var(--text3);font-size:13px;text-align:center;">私聊对话</div>`;
    return;
  }

  let html = '';

  if (members.online.length > 0) {
    html += `<div class="member-section-title">在线 (${members.online.length})</div>`;
    members.online.forEach(m => {
      html += renderMemberItem(m);
    });
  }

  if (members.offline.length > 0) {
    html += `<div class="member-section-title" style="margin-top:12px;">离线 (${members.offline.length})</div>`;
    members.offline.forEach(m => {
      html += renderMemberItem(m);
    });
  }

  container.innerHTML = html;
}

function renderMemberItem(m) {
  const statusColor = m.status === 'green' ? 'var(--green)' : 'var(--text3)';
  const aiBadge = m.isAI ? `<span class="ai-badge-sm" style="font-size:8px;">AI</span>` : '';
  const tag = m.tag ? `<span class="member-tag ${m.tagClass}">${m.tag}</span>` : '';
  const tooltip = m.tooltip ? `<div class="observer-tooltip">${m.tooltip}</div>` : '';

  return `
    <div class="member-item">
      <div class="member-avatar" style="background: linear-gradient(135deg, ${m.color}, ${m.color}cc);">
        ${m.avatar}
        <div class="member-status" style="background: ${statusColor};"></div>
      </div>
      <div class="member-info">
        <div class="member-name">${m.name} ${aiBadge}</div>
        <div class="member-role-text">${m.role}</div>
      </div>
      ${tag}
      ${tooltip}
    </div>`;
}

function switchChannel(channelId) {
  if (!CHANNELS[channelId]) return;

  currentChannel = channelId;
  const channel = CHANNELS[channelId];

  // Update header
  document.getElementById('chatHeaderName').textContent = channel.name;
  document.getElementById('chatHeaderMeta').textContent = channel.meta;
  document.querySelector('.chat-header-hash').innerHTML = channel.hash || '';

  // Update input placeholder
  document.getElementById('chatInput').placeholder = channel.placeholder;

  // Update active channel in list
  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.channel === channelId) {
      el.classList.add('active');
      // Remove unread badge on click
      const badge = el.querySelector('.ch-badge');
      if (badge) badge.style.display = 'none';
    }
  });

  // Render
  renderMessages(channelId);
  renderMembers(channelId);
}

// ============ EVENT HANDLERS ============

// Channel clicks
document.querySelectorAll('.channel-item').forEach(el => {
  el.addEventListener('click', () => {
    switchChannel(el.dataset.channel);
  });
});

// Visibility toggle
document.getElementById('visibilityBtn').addEventListener('click', function() {
  showBotInternal = !showBotInternal;
  this.classList.toggle('active', showBotInternal);
  document.querySelectorAll('.bot-internal').forEach(el => {
    el.classList.toggle('visible', showBotInternal);
  });
  // Update tooltip
  document.getElementById('visibilityTooltip').textContent =
    showBotInternal ? 'Bot 内部对话: 显示中' : '点击切换: 显示/隐藏 Bot 内部对话';
});

// Typing animation
let typingTimeout;
document.getElementById('chatInput').addEventListener('focus', () => {
  const indicator = document.getElementById('typingIndicator');
  if (indicator) {
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      indicator.classList.add('visible');
      // Hide after 3 seconds
      setTimeout(() => {
        indicator.classList.remove('visible');
      }, 3000);
    }, 800);
  }
});

document.getElementById('chatInput').addEventListener('blur', () => {
  clearTimeout(typingTimeout);
});

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Member panel toggle
document.getElementById('toggleMembers').addEventListener('click', function() {
  const panel = document.getElementById('memberPanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? '' : 'none';
  this.classList.toggle('active', isHidden);
});

// ============ INIT ============
renderMessages('product-dev');
renderMembers('product-dev');
</script>
